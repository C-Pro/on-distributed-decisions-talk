<link rel="preload" href="pages/06-isolated-sharding.css" as="style">

<div class="slide center" data-init="initIsolatedSharding">
    <div class="sharding-slide-container">
        <h1 class="sharding-h1">Isolated Sharding</h1>
        <p class="sharding-subtitle">
            Access patterns can be isolated to a single shard (e.g., <strong>monitoring systems</strong> or <strong>app analytics</strong>). 
            A single shard failure only affects a subset of users.
        </p>
        
        <div class="demo-card sharding-card">
            <!-- Interactive SVG diagram with 3 users/shards -->
            <svg id="isolated-svg" viewBox="0 0 800 320" width="100%" height="100%">
                <defs>
                    <!-- Glowing Filters -->
                    <filter id="glow-accent" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="8" result="blur" />
                        <feComposite in="SourceGraphic" in2="blur" operator="over" />
                    </filter>
                    <filter id="glow-danger" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="8" result="blur" />
                        <feComposite in="SourceGraphic" in2="blur" operator="over" />
                    </filter>
                    <!-- Node Gradients -->
                    <linearGradient id="userGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#818cf8" />
                        <stop offset="100%" stop-color="#4f46e5" />
                    </linearGradient>
                    <linearGradient id="shardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#10b981" />
                        <stop offset="100%" stop-color="#059669" />
                    </linearGradient>
                    <linearGradient id="failGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#f87171" />
                        <stop offset="100%" stop-color="#dc2626" />
                    </linearGradient>
                </defs>

                <!-- Connection Lines -->
                <g class="connections-group">
                    <path id="path-1" class="connection-line" d="M 200 80 L 200 240" />
                    <path id="path-2" class="connection-line" d="M 400 80 L 400 240" />
                    <path id="path-3" class="connection-line" d="M 600 80 L 600 240" />
                </g>

                <!-- Animated Particles -->
                <g id="particles-group"></g>

                <!-- User Nodes -->
                <g class="nodes-group">
                    <g id="user-1" class="node-item user-node" data-index="1">
                        <circle cx="200" cy="80" r="30" class="node-circle" />
                        <text x="200" y="85" class="node-label">User 1</text>
                    </g>
                    <g id="user-2" class="node-item user-node" data-index="2">
                        <circle cx="400" cy="80" r="30" class="node-circle" />
                        <text x="400" y="85" class="node-label">User 2</text>
                    </g>
                    <g id="user-3" class="node-item user-node" data-index="3">
                        <circle cx="600" cy="80" r="30" class="node-circle" />
                        <text x="600" y="85" class="node-label">User 3</text>
                    </g>
                </g>

                <!-- Shard Nodes -->
                <g class="nodes-group">
                    <g id="shard-1" class="node-item shard-node" data-index="1">
                        <rect x="155" y="240" width="90" height="46" rx="8" class="node-rect" />
                        <text x="200" y="268" class="node-label">Shard 1</text>
                    </g>
                    <g id="shard-2" class="node-item shard-node" data-index="2">
                        <rect x="355" y="240" width="90" height="46" rx="8" class="node-rect" />
                        <text x="400" y="268" class="node-label">Shard 2</text>
                    </g>
                    <g id="shard-3" class="node-item shard-node" data-index="3">
                        <rect x="555" y="240" width="90" height="46" rx="8" class="node-rect" />
                        <text x="600" y="268" class="node-label">Shard 3</text>
                    </g>
                </g>
            </svg>
        </div>
    </div>

    <div class="nav-hint">
        <span>PgUp</span> Prev | <span>PgDn</span> Next
    </div>
</div>
