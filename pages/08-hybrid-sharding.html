<link rel="preload" href="pages/08-hybrid-sharding.js" as="script">
<link rel="preload" href="pages/08-hybrid-sharding.css" as="style">

<div class="slide center" data-init="initHybridSharding">
    <div class="sharding-slide-container">
        <h1 class="sharding-h1">Hybrid Sharding: The Exchange Pattern</h1>
        <p class="sharding-subtitle">
            An <strong>exchange</strong> combines both patterns. User wallets are sharded independently (isolated), 
            while shared orderbooks (cross-shard) are where all users meet to trade.
        </p>
        
        <div class="demo-card sharding-card">
            <!-- Interactive SVG diagram with 3 tiers and 3 nodes each -->
            <svg id="hybrid-svg" viewBox="0 0 800 300" width="100%" height="100%">
                <defs>
                    <!-- Glowing Filters -->
                    <filter id="glow-accent-hybrid" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="8" result="blur" />
                        <feComposite in="SourceGraphic" in2="blur" operator="over" />
                    </filter>
                    <filter id="glow-danger-hybrid" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="8" result="blur" />
                        <feComposite in="SourceGraphic" in2="blur" operator="over" />
                    </filter>
                    <!-- Node Gradients -->
                    <linearGradient id="userGradHybrid" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#818cf8" />
                        <stop offset="100%" stop-color="#4f46e5" />
                    </linearGradient>
                    <linearGradient id="walletGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#3b82f6" />
                        <stop offset="100%" stop-color="#1d4ed8" />
                    </linearGradient>
                    <linearGradient id="orderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#10b981" />
                        <stop offset="100%" stop-color="#059669" />
                    </linearGradient>
                    <linearGradient id="failGradHybrid" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#f87171" />
                        <stop offset="100%" stop-color="#dc2626" />
                    </linearGradient>
                </defs>

                <!-- Connection Lines: Tier 1 to Tier 2 (Users to Wallets) -->
                <g class="connections-group">
                    <path id="path-u-1" class="connection-line line-wallet" d="M 200 40 L 200 135" data-user="1" />
                    <path id="path-u-2" class="connection-line line-wallet" d="M 400 40 L 400 135" data-user="2" />
                    <path id="path-u-3" class="connection-line line-wallet" d="M 600 40 L 600 135" data-user="3" />
                </g>

                <!-- Connection Lines: Tier 2 to Tier 3 (Wallets to Orderbooks) -->
                <g class="connections-group">
                    <!-- Wallet 1 to Orderbooks 1, 2 -->
                    <path id="path-w-1-1" class="connection-line line-order" d="M 200 165 L 200 245" data-wallet="1" data-book="1" />
                    <path id="path-w-1-2" class="connection-line line-order" d="M 200 165 L 400 245" data-wallet="1" data-book="2" />
                    
                    <!-- Wallet 2 to Orderbook 2 -->
                    <path id="path-w-2-2" class="connection-line line-order" d="M 400 165 L 400 245" data-wallet="2" data-book="2" />
                    
                    <!-- Wallet 3 to Orderbooks 2, 3 -->
                    <path id="path-w-3-2" class="connection-line line-order" d="M 600 165 L 400 245" data-wallet="3" data-book="2" />
                    <path id="path-w-3-3" class="connection-line line-order" d="M 600 165 L 600 245" data-wallet="3" data-book="3" />
                </g>

                <!-- Animated Particles -->
                <g id="particles-group-hybrid"></g>

                <!-- Tier 1: User Nodes -->
                <g class="nodes-group">
                    <g id="user-1" class="node-item user-node" data-index="1">
                        <circle cx="200" cy="40" r="20" class="node-circle" />
                        <text x="200" y="44" class="node-label-small">U1</text>
                    </g>
                    <g id="user-2" class="node-item user-node" data-index="2">
                        <circle cx="400" cy="40" r="20" class="node-circle" />
                        <text x="400" y="44" class="node-label-small">U2</text>
                    </g>
                    <g id="user-3" class="node-item user-node" data-index="3">
                        <circle cx="600" cy="40" r="20" class="node-circle" />
                        <text x="600" y="44" class="node-label-small">U3 🎩</text>
                    </g>
                </g>

                <!-- Tier 2: Wallet Shard Nodes -->
                <g class="nodes-group">
                    <g id="wallet-1" class="node-item wallet-node" data-index="1">
                        <rect x="165" y="135" width="70" height="30" rx="6" class="node-wallet-rect" />
                        <text x="200" y="154" class="node-label-xs">Wallet 1</text>
                    </g>
                    <g id="wallet-2" class="node-item wallet-node" data-index="2">
                        <rect x="365" y="135" width="70" height="30" rx="6" class="node-wallet-rect" />
                        <text x="400" y="154" class="node-label-xs">Wallet 2</text>
                    </g>
                    <g id="wallet-3" class="node-item wallet-node" data-index="3">
                        <rect x="565" y="135" width="70" height="30" rx="6" class="node-wallet-rect" />
                        <text x="600" y="154" class="node-label-xs">Wallet 3</text>
                    </g>
                </g>

                <!-- Tier 3: Orderbook Shard Nodes -->
                <g class="nodes-group">
                    <g id="book-1" class="node-item book-node" data-index="1">
                        <rect x="160" y="245" width="80" height="36" rx="8" class="node-book-rect" />
                        <text x="200" y="267" class="node-label-xs">Book BTC</text>
                    </g>
                    <g id="book-2" class="node-item book-node" data-index="2">
                        <rect x="360" y="245" width="80" height="36" rx="8" class="node-book-rect" />
                        <text x="400" y="267" class="node-label-xs">Book ETH</text>
                    </g>
                    <g id="book-3" class="node-item book-node" data-index="3">
                        <rect x="560" y="245" width="80" height="36" rx="8" class="node-book-rect" />
                        <text x="600" y="267" class="node-label-xs">Book SOL</text>
                    </g>
                </g>
            </svg>
        </div>
    </div>

    <div class="nav-hint">
        <span>PgUp</span> Prev | <span>PgDn</span> Next
    </div>
</div>
